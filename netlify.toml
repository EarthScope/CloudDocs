[build]
  command = "npm install -g mystmd && myst build --html"
  publish = "_build/html"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  function = "inject-prefetch"
  path = "/*"

# /onramp/geolab
[[redirects]]
  from = "/geolab"
  to = "https://earthscope-geolab-docs.netlify.app/geolab"
  status = 200
  force = true

[[redirects]]
  from = "/geolab/*"
  to = "https://earthscope-geolab-docs.netlify.app/geolab/:splat"
  status = 200
  force = true

# /cli
[[redirects]]
  from = "/cli"
  to = "https://earthscope-cli.netlify.app/cli"
  status = 200
  force = true

[[redirects]]
  from = "/cli/*"
  to = "https://earthscope-cli.netlify.app/cli/:splat"
  status = 200
  force = true

# /sdk
[[redirects]]
  from = "/sdk"
  to = "https://earthscope-sdk.netlify.app/sdk"
  status = 200
  force = true

[[redirects]]
  from = "/sdk/*"
  to = "https://earthscope-sdk.netlify.app/sdk/:splat"
  status = 200
  force = true

# /api
[[redirects]]
  from = "/api"
  to = "https://earthscope-api.netlify.app/api"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://earthscope-api.netlify.app/api/:splat"
  status = 200
  force = true
