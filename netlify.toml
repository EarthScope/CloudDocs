[build]
  publish = "_build/html"
#  command = "npm install -g mystmd@~1.9.0 && myst --version && myst build --html"
  command = """
    set -e

    curl -fsSL https://bun.sh/install | bash
    export PATH="$HOME/.bun/bin:$PATH"
    bun --version

    git clone --depth 1 --branch index-redirect-hydration \
      https://github.com/chad-earthscope/mystmd.git ../mystmd-fork
    (cd ../mystmd-fork && bun install && bun run build && bun run link)

    # git clone --depth 1 --branch toc-baseurl-hydration \
    #   https://github.com/chad-earthscope/myst-theme.git ../myst-theme-fork
    # (cd ../myst-theme-fork && bun install && make build-book)

    myst --version
    myst build --html
  """

[build.environment]
  NODE_VERSION = "24"

# Legacy GeoLab paths (old Read the Docs–style URLs) -> new /geolab/* layout
# The old site nested everything under /content/; the new layout drops that segment.
[[redirects]]
  from = "/projects/GeoLab/en/latest/content"
  to = "/geolab"
  status = 301
  force = true

[[redirects]]
  from = "/projects/GeoLab/en/latest/content/*"
  to = "/geolab/:splat"
  status = 301
  force = true

# /onramp/geolab
[[redirects]]
  from = "/geolab"
  to = "https://earthscope-geolab-docs.netlify.app/geolab"
  status = 200
  force = true

[[redirects]]
  from = "/geolab/*"
  to = "https://earthscope-geolab-docs.netlify.app/geolab/:splat"
  status = 200
  force = true

# /cli
[[redirects]]
  from = "/cli"
  to = "https://earthscope-cli.netlify.app/cli"
  status = 200
  force = true

[[redirects]]
  from = "/cli/*"
  to = "https://earthscope-cli.netlify.app/cli/:splat"
  status = 200
  force = true

# /sdk
[[redirects]]
  from = "/sdk"
  to = "https://earthscope-sdk.netlify.app/sdk"
  status = 200
  force = true

[[redirects]]
  from = "/sdk/*"
  to = "https://earthscope-sdk.netlify.app/sdk/:splat"
  status = 200
  force = true

# /api
[[redirects]]
  from = "/api"
  to = "https://api.earthscope.org/"
  status = 301
  force = true

# /service/seedlink
[[redirects]]
  from = "/service/seedlink"
  to = "https://earthscope-seedlink-export-docs.netlify.app/service/seedlink"
  status = 200
  force = true

[[redirects]]
  from = "/service/seedlink/*"
  to = "https://earthscope-seedlink-export-docs.netlify.app/service/seedlink/:splat"
  status = 200
  force = true

