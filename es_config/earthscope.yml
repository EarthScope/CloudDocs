# Shared configuration file for all EarthScope repositories that feed into docs.earthscope.org

version: 1
project:
  open_access: true
  license:
    content: CC-BY-4.0
    code: Apache-2.0

site:
  template: book-theme
  options:
    folders: true
    favicon: https://www.earthscope.org/app/uploads/2022/12/cropped-favicon-32x32.png
    logo: https://www.earthscope.org/app/uploads/2025/11/NSFNGF-Logo-RGB-Color.svg
    logo_dark: https://www.earthscope.org/app/uploads/2025/11/NSFNGF-Logo-RGB-White.svg
    logo_url: https://www.earthscope.org
    internal_domains:
      - docs.earthscope.org
      - docs-earthscope-org.netlify.app

  nav:
    - title: Docs Home
      url: https://docs.earthscope.org
    - title: GeoLab
      url: https://docs.earthscope.org/geolab
    - title: CLI
      url: https://docs.earthscope.org/cli
    - title: API
      url: https://docs.earthscope.org/api
    - title: SDK
      url: https://docs.earthscope.org/sdk
